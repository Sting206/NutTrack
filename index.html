<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>Дневник питания</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Onest:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f0f0f;
    --card: #1a1a1a;
    --card2: #222;
    --accent: #c8f55a;
    --accent2: #f5a623;
    --accent3: #5af5c8;
    --fat: #ff6b6b;
    --water: #4d9eff;
    --purple: #a78bfa;
    --text: #f0f0f0;
    --muted: #888;
    --border: #2a2a2a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { background: #0f0f0f; }
  body { background: #0f0f0f; color: #f0f0f0; font-family: 'Onest', sans-serif; min-height: 100vh; padding: 40px 20px 80px; }
  .container { max-width: 960px; margin: 0 auto; background: #0f0f0f; }
  header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid var(--border); padding-bottom: 24px; margin-bottom: 48px; flex-wrap: wrap; gap: 16px; }
  header h1 { font-family: 'Unbounded', sans-serif; font-size: clamp(22px, 4vw, 36px); font-weight: 900; line-height: 1.1; letter-spacing: -1px; }
  header h1 span { color: var(--accent); }
  .goals-header { text-align: right; font-size: 12px; color: var(--muted); line-height: 1.8; }
  .goals-header strong { color: var(--accent); font-size: 13px; }
  .refresh-status { font-size: 10px; color: var(--muted); margin-top: 8px; text-align: right; }
  .refresh-status button { background: none; border: 1px solid var(--border); color: var(--muted); padding: 4px 12px; border-radius: 20px; font-size: 10px; cursor: pointer; transition: all 0.2s; }
  .refresh-status button:hover { border-color: var(--accent); color: var(--accent); }
  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 48px; }
  .chart-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 22px; }
  .chart-card.wide { grid-column: 1 / -1; }
  .chart-title { font-family: 'Unbounded', sans-serif; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
  .chart-title span { color: var(--accent); margin-left: 6px; }
  .chart-wrap { position: relative; height: 180px; }
  .chart-wrap.tall { height: 220px; }
  .water-section { margin-bottom: 48px; }
  .water-summary { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 16px; }
  .water-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px 20px; flex: 1; min-width: 150px; }
  .water-value { font-family: 'Unbounded', sans-serif; font-size: 28px; font-weight: 700; color: var(--water); }
  .water-goal { font-size: 12px; color: var(--muted); }
  .section-title { font-family: 'Unbounded', sans-serif; font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .weight-cards { display: flex; gap: 12px; overflow-x: auto; scroll-snap-type: x mandatory; padding-bottom: 8px; }
  .weight-cards::-webkit-scrollbar { height: 4px; }
  .weight-cards::-webkit-scrollbar-track { background: var(--border); border-radius: 99px; }
  .weight-cards::-webkit-scrollbar-thumb { background: #444; border-radius: 99px; }
  .weight-day-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px 20px; min-width: 180px; flex-shrink: 0; scroll-snap-align: start; }
  .weight-date { font-family: 'Unbounded', sans-serif; font-size: 10px; font-weight: 700; color: var(--muted); margin-bottom: 10px; }
  .weight-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .weight-label { font-size: 11px; color: var(--muted); }
  .weight-val { font-family: 'Unbounded', sans-serif; font-size: 16px; font-weight: 700; }
  .weight-val.morning { color: #f5c842; }
  .day-block { margin-bottom: 12px; animation: fadeUp 0.5s ease both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .accordion { border-radius: 16px; overflow: hidden; border: 1px solid var(--border); }
  .accordion-header { background: var(--card2); padding: 16px 20px; cursor: pointer; user-select: none; display: grid; grid-template-columns: auto 1fr auto auto; gap: 14px; align-items: center; transition: background 0.2s; }
  .accordion-header:hover { background: #262626; }
  .day-label { font-family: 'Unbounded', sans-serif; font-size: 12px; font-weight: 700; color: #f0f0f0; background: #3a3a3a; padding: 4px 14px; border-radius: 100px; white-space: nowrap; }
  .accordion-summary { display: flex; gap: 20px; flex-wrap: wrap; align-items: center; }
  .summary-macro { display: flex; flex-direction: column; align-items: center; }
  .summary-val { font-family: 'Unbounded', sans-serif; font-size: 15px; font-weight: 700; line-height: 1; }
  .summary-val.kcal { color: var(--accent2); }
  .summary-val.protein { color: var(--accent); }
  .summary-val.carbs { color: var(--accent3); }
  .summary-val.fat { color: var(--fat); }
  .summary-val.water { color: var(--water); }
  .summary-label { font-size: 9px; color: var(--muted); margin-top: 3px; }
  .accordion-bars { display: flex; flex-direction: column; gap: 5px; min-width: 140px; }
  .bar-row { display: flex; align-items: center; gap: 8px; }
  .bar-track { flex: 1; height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 99px; }
  .bar-fill.kcal { background: var(--accent2); }
  .bar-fill.protein { background: var(--accent); }
  .bar-fill.carbs { background: var(--accent3); }
  .bar-fill.fat { background: var(--fat); }
  .bar-fill.water { background: var(--water); }
  .bar-pct { font-size: 10px; color: var(--muted); width: 28px; text-align: right; }
  .accordion-chevron { font-size: 18px; color: var(--muted); transition: transform 0.3s; line-height: 1; }
  .accordion.open .accordion-chevron { transform: rotate(180deg); }
  .accordion-body { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
  .accordion.open .accordion-body { max-height: 2000px; }
  .accordion-inner { padding: 12px; display: flex; flex-direction: column; gap: 8px; background: var(--bg); border-top: 1px solid var(--border); }
  .meal-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; display: grid; grid-template-columns: 90px 1fr auto; gap: 12px; align-items: start; transition: border-color 0.2s; }
  .meal-card:hover { border-color: #444; }
  .meal-type { font-family: 'Unbounded', sans-serif; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #aaa; padding-top: 2px; }
  .meal-desc { font-size: 13px; color: #bbb; line-height: 1.6; }
  .meal-desc strong { color: var(--text); font-weight: 500; }
  .meal-macros { display: flex; gap: 8px; }
  .macro { display: flex; flex-direction: column; align-items: center; min-width: 48px; }
  .macro-val { font-family: 'Unbounded', sans-serif; font-size: 14px; font-weight: 700; line-height: 1; }
  .macro-val.kcal { color: var(--accent2); }
  .macro-val.protein { color: var(--accent); }
  .macro-val.carbs { color: var(--accent3); }
  .macro-val.fat { color: var(--fat); }
  .macro-label { font-size: 9px; color: var(--muted); margin-top: 3px; }
  .loading { text-align: center; padding: 40px; color: var(--muted); }
  .empty-state { text-align: center; padding: 40px; color: var(--muted); background: var(--card); border-radius: 20px; margin: 20px 0; }
  footer { text-align: center; font-size: 11px; color: #444; border-top: 1px solid var(--border); padding-top: 24px; margin-top: 60px; }
  @media (max-width: 640px) {
    .charts-grid { grid-template-columns: 1fr; }
    .chart-card.wide { grid-column: 1; }
    .meal-card { grid-template-columns: 1fr; gap: 6px; }
    .meal-macros { justify-content: flex-start; gap: 16px; margin-top: 4px; }
    .accordion-header { padding: 12px 14px; grid-template-columns: auto 1fr auto auto; gap: 10px; }
    .accordion-summary { gap: 10px; flex-wrap: nowrap; }
    .accordion-bars { min-width: 90px; }
    body { padding: 16px 12px 60px; }
    header { flex-direction: column; align-items: flex-start; }
    .goals-header { text-align: left; }
    .weight-cards { flex-direction: column; overflow-x: visible; }
    .weight-day-card { min-width: unset; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Дневник<br><span>питания</span></h1>
    <div>
      <div class="goals-header">
        <strong>Цели в день</strong><br>
        🔥 2800 ккал &nbsp;|&nbsp; 💪 160г белка &nbsp;|&nbsp; 🌾 350г углеводов &nbsp;|&nbsp; 🥑 80г жиров &nbsp;|&nbsp; 💧 2.5л воды<br>
        <span style="color:#555">Цель веса: 80 кг</span>
      </div>
      <div class="refresh-status">
        <span id="lastUpdate">Загрузка данных...</span>
        <button onclick="loadAllData()">🔄 Обновить</button>
      </div>
    </div>
  </header>

  <div id="app">
    <div class="loading">📡 Загрузка данных из Google Sheets...</div>
  </div>

  <footer id="footer">
    Цель: 80 кг · Данные из Google Sheets · Обновляется автоматически
  </footer>
</div>

<script>
// ==================== КОНФИГУРАЦИЯ ====================
const SHEET_ID = '1A0NOB0Rbx-u-gg6gaKTR1mMbZGwJHUzV9b63o9sqr3w';

const SHEET_FOOD = 'Питание';
const SHEET_WEIGHT = 'Вес';
const SHEET_WATER = 'Вода';

// Цели (добавлены жиры)
const GOALS = {
  kcal: 2800,
  protein: 160,
  carbs: 350,
  fat: 80,      // цель по жирам в граммах
  water: 2500
};

let appData = { foods: [], weights: [], water: [] };
let charts = {};

// ==================== ЗАГРУЗКА ====================
async function loadSheetAsCSV(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
  const response = await fetch(url);
  if (!response.ok) {
    throw new Error(`${sheetName}: ${response.status}`);
  }
  const csvText = await response.text();
  return parseCSV(csvText);
}

function parseCSV(csvText) {
  const rows = [];
  const lines = csvText.split('\n');
  
  for (const line of lines) {
    if (line.trim() === '') continue;
    const row = [];
    let inQuotes = false;
    let currentCell = '';
    
    for (let i = 0; i < line.length; i++) {
      const char = line[i];
      if (char === '"') {
        inQuotes = !inQuotes;
      } else if (char === ',' && !inQuotes) {
        row.push(currentCell.trim());
        currentCell = '';
      } else {
        currentCell += char;
      }
    }
    row.push(currentCell.trim());
    const cleanedRow = row.map(cell => cell.replace(/^"|"$/g, ''));
    rows.push(cleanedRow);
  }
  return rows;
}

// Парсинг питания (добавлены жиры)
function parseFoodData(rows) {
  if (!rows || rows.length < 2) return [];
  
  const headers = rows[0].map(h => h.toLowerCase().trim());
  const dateIdx = headers.findIndex(h => h.includes('дата') || h === 'date');
  const mealIdx = headers.findIndex(h => h.includes('прием') || h.includes('meal') || h.includes('тип'));
  const descIdx = headers.findIndex(h => h.includes('описание') || h.includes('блюдо') || h.includes('продукт'));
  const kcalIdx = headers.findIndex(h => h === 'ккал');
  const proteinIdx = headers.findIndex(h => h === 'белок');
  const carbsIdx = headers.findIndex(h => h === 'углеводы');
  const fatIdx = headers.findIndex(h => h === 'жиры' || h === 'жир');
  
  const foods = [];
  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row[dateIdx] || row[dateIdx].trim() === '') continue;
    
    foods.push({
      date: formatDate(row[dateIdx]),
      mealType: row[mealIdx] ? row[mealIdx].toLowerCase() : 'доп',
      description: row[descIdx] || '—',
      kcal: parseFloat(row[kcalIdx]) || 0,
      protein: parseFloat(row[proteinIdx]) || 0,
      carbs: parseFloat(row[carbsIdx]) || 0,
      fat: parseFloat(row[fatIdx]) || 0
    });
  }
  return foods;
}

function parseWeightData(rows) {
  if (!rows || rows.length < 2) return [];
  const headers = rows[0].map(h => h.toLowerCase().trim());
  const dateIdx = headers.findIndex(h => h.includes('дата') || h === 'date');
  const weightIdx = headers.findIndex(h => h.includes('вес') || h === 'weight');
  
  const weights = [];
  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row[dateIdx]) continue;
    const weight = parseFloat(row[weightIdx]);
    if (!isNaN(weight) && weight > 0) {
      weights.push({
        date: formatDate(row[dateIdx]),
        weight: weight
      });
    }
  }
  return weights.sort((a, b) => a.date.localeCompare(b.date));
}

function parseWaterData(rows) {
  if (!rows || rows.length < 2) return [];
  const headers = rows[0].map(h => h.toLowerCase().trim());
  const dateIdx = headers.findIndex(h => h.includes('дата') || h === 'date');
  const amountIdx = headers.findIndex(h => h.includes('мл') || h.includes('amount') || h.includes('вода'));
  
  const water = [];
  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row[dateIdx]) continue;
    const amount = parseFloat(row[amountIdx]);
    if (!isNaN(amount) && amount > 0) {
      water.push({
        date: formatDate(row[dateIdx]),
        amount: amount
      });
    }
  }
  return water;
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  dateStr = dateStr.split(' ')[0];
  let d = new Date(dateStr);
  if (!isNaN(d.getTime())) {
    return `${d.getDate().toString().padStart(2, '0')}.${(d.getMonth() + 1).toString().padStart(2, '0')}`;
  }
  const parts = dateStr.split(/[.\/]/);
  if (parts.length >= 2) {
    return `${parts[0].padStart(2, '0')}.${parts[1].padStart(2, '0')}`;
  }
  return dateStr;
}

function aggregateByDay(foods) {
  const daily = {};
  foods.forEach(f => {
    if (!daily[f.date]) {
      daily[f.date] = { kcal: 0, protein: 0, carbs: 0, fat: 0, meals: [] };
    }
    daily[f.date].kcal += f.kcal;
    daily[f.date].protein += f.protein;
    daily[f.date].carbs += f.carbs;
    daily[f.date].fat += f.fat;
    daily[f.date].meals.push(f);
  });
  return daily;
}

function getWaterByDay(waterData) {
  const waterByDay = {};
  waterData.forEach(w => {
    waterByDay[w.date] = (waterByDay[w.date] || 0) + w.amount;
  });
  return waterByDay;
}

function renderUI() {
  const dailyData = aggregateByDay(appData.foods);
  const waterByDay = getWaterByDay(appData.water);
  const dates = Object.keys(dailyData).sort().reverse();
  
  if (dates.length === 0 && appData.weights.length === 0) {
    document.getElementById('app').innerHTML = `
      <div class="empty-state">
        📭 Нет данных. Добавьте данные в Google Sheets.<br><br>
        <strong>Структура листа "Питание":</strong><br>
        Дата | Прием | Описание | ккал | белок | углеводы | жиры
      </div>
    `;
    return;
  }
  
  let chartsHtml = `
    <div class="charts-grid">
      <div class="chart-card wide">
        <div class="chart-title">📈 Динамика веса <span>кг</span></div>
        <div class="chart-wrap tall"><canvas id="weightChart"></canvas></div>
        <div class="weight-cards" style="margin-top:16px; display:flex; gap:12px; overflow-x:auto">
          ${appData.weights.slice().reverse().slice(0, 7).map(w => `
            <div class="weight-day-card">
              <div class="weight-date">${w.date}</div>
              <div class="weight-row"><div class="weight-label">⚖️ Вес</div><div class="weight-val morning">${w.weight} кг</div></div>
            </div>
          `).join('')}
        </div>
      </div>
      <div class="chart-card wide">
        <div class="chart-title">📊 Нутриенты по дням</div>
        <div class="chart-wrap" style="height:220px"><canvas id="nutrientsChart"></canvas></div>
      </div>
    </div>
  `;
  
  const last7Days = dates.slice(0, 7);
  const avgWater = last7Days.reduce((sum, d) => sum + (waterByDay[d] || 0), 0) / (last7Days.length || 1);
  const todayWater = waterByDay[dates[0]] || 0;
  
  chartsHtml += `
    <div class="water-section">
      <div class="section-title">💧 Водный баланс</div>
      <div class="water-summary">
        <div class="water-card">
          <div class="water-value">${todayWater} мл</div>
          <div class="water-goal">сегодня / ${GOALS.water} мл</div>
          <div class="bar-track" style="margin-top:8px"><div class="bar-fill water" style="width:${Math.min(100, (todayWater / GOALS.water) * 100)}%"></div></div>
        </div>
        <div class="water-card">
          <div class="water-value">${Math.round(avgWater)} мл</div>
          <div class="water-goal">среднее за 7 дней</div>
        </div>
      </div>
    </div>
  `;
  
  let daysHtml = '';
  dates.forEach((date, idx) => {
    const day = dailyData[date];
    const waterAmount = waterByDay[date] || 0;
    const kcalPercent = Math.min(100, (day.kcal / GOALS.kcal) * 100);
    const proteinPercent = Math.min(100, (day.protein / GOALS.protein) * 100);
    const carbsPercent = Math.min(100, (day.carbs / GOALS.carbs) * 100);
    const fatPercent = Math.min(100, (day.fat / GOALS.fat) * 100);
    const waterPercent = Math.min(100, (waterAmount / GOALS.water) * 100);
    
    daysHtml += `
      <div class="day-block">
        <div class="accordion ${idx === 0 ? 'open' : ''}" id="day-${date.replace(/\./g, '-')}">
          <div class="accordion-header" onclick="toggle('day-${date.replace(/\./g, '-')}')">
            <div class="day-label">${date}</div>
            <div class="accordion-summary">
              <div class="summary-macro"><div class="summary-val kcal">${Math.round(day.kcal)}</div><div class="summary-label">ккал</div></div>
              <div class="summary-macro"><div class="summary-val protein">${Math.round(day.protein)}г</div><div class="summary-label">белок</div></div>
              <div class="summary-macro"><div class="summary-val carbs">${Math.round(day.carbs)}г</div><div class="summary-label">углев.</div></div>
              <div class="summary-macro"><div class="summary-val fat">${Math.round(day.fat)}г</div><div class="summary-label">жиры</div></div>
              <div class="summary-macro"><div class="summary-val water">${waterAmount}мл</div><div class="summary-label">вода</div></div>
            </div>
            <div class="accordion-bars">
              <div class="bar-row"><div class="bar-track"><div class="bar-fill kcal" style="width:${kcalPercent}%"></div></div><div class="bar-pct">${Math.round(kcalPercent)}%</div></div>
              <div class="bar-row"><div class="bar-track"><div class="bar-fill protein" style="width:${proteinPercent}%"></div></div><div class="bar-pct">${Math.round(proteinPercent)}%</div></div>
              <div class="bar-row"><div class="bar-track"><div class="bar-fill carbs" style="width:${carbsPercent}%"></div></div><div class="bar-pct">${Math.round(carbsPercent)}%</div></div>
              <div class="bar-row"><div class="bar-track"><div class="bar-fill fat" style="width:${fatPercent}%"></div></div><div class="bar-pct">${Math.round(fatPercent)}%</div></div>
              <div class="bar-row"><div class="bar-track"><div class="bar-fill water" style="width:${waterPercent}%"></div></div><div class="bar-pct">${Math.round(waterPercent)}%</div></div>
            </div>
            <div class="accordion-chevron">▾</div>
          </div>
          <div class="accordion-body">
            <div class="accordion-inner">
              ${day.meals.map(meal => `
                <div class="meal-card">
                  <div class="meal-type">${meal.mealType}</div>
                  <div class="meal-desc"><strong>${meal.description}</strong></div>
                  <div class="meal-macros">
                    <div class="macro"><div class="macro-val kcal">${Math.round(meal.kcal)}</div><div class="macro-label">ккал</div></div>
                    <div class="macro"><div class="macro-val protein">${Math.round(meal.protein)}г</div><div class="macro-label">белок</div></div>
                    <div class="macro"><div class="macro-val carbs">${Math.round(meal.carbs)}г</div><div class="macro-label">углев.</div></div>
                    <div class="macro"><div class="macro-val fat">${Math.round(meal.fat)}г</div><div class="macro-label">жиры</div></div>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      </div>
    `;
  });
  
  document.getElementById('app').innerHTML = chartsHtml + daysHtml;
  updateCharts();
  document.getElementById('lastUpdate').innerHTML = `📅 Обновлено: ${new Date().toLocaleTimeString()}`;
}

function updateCharts() {
  const dailyData = aggregateByDay(appData.foods);
  const dates = Object.keys(dailyData).sort();
  
  if (charts.weight) charts.weight.destroy();
  const weightCtx = document.getElementById('weightChart')?.getContext('2d');
  if (weightCtx && appData.weights.length) {
    charts.weight = new Chart(weightCtx, {
      type: 'line',
      data: {
        labels: appData.weights.map(w => w.date),
        datasets: [
          { label: 'Вес', data: appData.weights.map(w => w.weight), borderColor: '#c8f55a', backgroundColor: 'rgba(200,245,90,0.07)', pointBackgroundColor: '#c8f55a', pointRadius: 5, tension: 0.3, fill: true },
          { label: 'Цель 80 кг', data: Array(appData.weights.length).fill(80), borderColor: '#2a2a2a', borderDash: [6, 4], pointRadius: 0 }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#555', font: { size: 11 } } } },
        scales: { y: { min: 60, max: 75, grid: { color: '#1e1e1e' }, ticks: { color: '#666' } }, x: { grid: { color: '#1e1e1e' }, ticks: { color: '#666' } } }
      }
    });
  }
  
  if (charts.nutrients) charts.nutrients.destroy();
  const nutrientsCtx = document.getElementById('nutrientsChart')?.getContext('2d');
  if (nutrientsCtx && dates.length) {
    charts.nutrients = new Chart(nutrientsCtx, {
      type: 'bar',
      data: {
        labels: dates,
        datasets: [
          { label: 'Ккал', data: dates.map(d => dailyData[d].kcal), backgroundColor: 'rgba(245,166,35,0.85)', borderColor: '#f5a623', borderRadius: 6, yAxisID: 'yKcal' },
          { label: 'Белок г', data: dates.map(d => dailyData[d].protein), backgroundColor: 'rgba(200,245,90,0.85)', borderColor: '#c8f55a', borderRadius: 6, yAxisID: 'yGrams' },
          { label: 'Углеводы г', data: dates.map(d => dailyData[d].carbs), backgroundColor: 'rgba(90,245,200,0.85)', borderColor: '#5af5c8', borderRadius: 6, yAxisID: 'yGrams' },
          { label: 'Жиры г', data: dates.map(d => dailyData[d].fat), backgroundColor: 'rgba(255,107,107,0.85)', borderColor: '#ff6b6b', borderRadius: 6, yAxisID: 'yGrams' }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#666', font: { size: 11 } } } },
        scales: {
          x: { grid: { color: '#1e1e1e' }, ticks: { color: '#666' } },
          yKcal: { position: 'left', grid: { color: '#1e1e1e' }, ticks: { color: '#f5a623' }, min: 0, max: 3500 },
          yGrams: { position: 'right', grid: { drawOnChartArea: false }, ticks: { color: '#5af5c8' }, min: 0, max: 450 }
        }
      }
    });
  }
}

async function loadAllData() {
  document.getElementById('app').innerHTML = '<div class="loading">📡 Загрузка данных из Google Sheets...</div>';
  
  try {
    const [foodRows, weightRows, waterRows] = await Promise.all([
      loadSheetAsCSV(SHEET_FOOD),
      loadSheetAsCSV(SHEET_WEIGHT),
      loadSheetAsCSV(SHEET_WATER)
    ]);
    
    appData.foods = parseFoodData(foodRows);
    appData.weights = parseWeightData(weightRows);
    appData.water = parseWaterData(waterRows);
    
    console.log(`✅ Загружено: еда=${appData.foods.length}, вес=${appData.weights.length}, вода=${appData.water.length}`);
    renderUI();
  } catch (error) {
    console.error('❌ Ошибка:', error);
    document.getElementById('app').innerHTML = `
      <div class="empty-state">
        ❌ Ошибка загрузки данных: ${error.message}<br><br>
        <strong>Чтобы исправить:</strong><br>
        1. Откройте таблицу: <a href="https://docs.google.com/spreadsheets/d/${SHEET_ID}" target="_blank" style="color:var(--accent)">открыть таблицу</a><br>
        2. Нажмите <strong>Файл → Поделиться → Доступ для всех с ссылкой</strong>
      </div>
    `;
  }
}

function toggle(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

loadAllData();
setInterval(loadAllData, 300000);
</script>
</body>
