<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>Дневник питания</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Onest:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  /* ========== НОВАЯ ЦВЕТОВАЯ СХЕМА ========== */
  :root {
    /* Основной синий и его вариации */
    --primary: #0A38A1;
    --primary-dark: #062E89;
    --primary-light: #2654BD;
    --primary-soft: #3B63BD;
    --primary-bg: #173C90;
    
    /* Акцент A (желтый) */
    --accent-a: #F1C800;
    --accent-a-dark: #CDAA00;
    --accent-a-light: #F5D125;
    --accent-a-soft: #F5D642;
    
    /* Акцент B (оранжевый) */
    --accent-b: #F16D00;
    --accent-b-dark: #CD5D00;
    --accent-b-light: #F58325;
    --accent-b-soft: #F59342;
    
    /* Фоны и интерфейс (на основе синего) */
    --bg: #0a0f1a;
    --card: #0f1628;
    --card2: #141e38;
    --border: #1e2c4a;
    --text: #f0f4fc;
    --muted: #8a9bb5;
    
    /* Специфические цвета для нутриентов */
    --kcal-color: var(--accent-a);
    --protein-color: var(--accent-b);
    --carbs-color: #5af5c8;
    --fat-color: #ff6b6b;
    --water-color: #4d9eff;
    
    --warning: #ffaa44;
    --danger: #ff5555;
  }
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { background: var(--bg); }
  body { background: var(--bg); color: var(--text); font-family: 'Onest', sans-serif; min-height: 100vh; padding: 40px 20px 80px; }
  .container { max-width: 960px; margin: 0 auto; background: var(--bg); }
  header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid var(--border); padding-bottom: 24px; margin-bottom: 48px; flex-wrap: wrap; gap: 16px; }
  header h1 { font-family: 'Unbounded', sans-serif; font-size: clamp(22px, 4vw, 36px); font-weight: 900; line-height: 1.1; letter-spacing: -1px; }
  header h1 span { color: var(--accent-a); }
  .goals-header { text-align: right; font-size: 12px; color: var(--muted); line-height: 1.8; }
  .goals-header strong { color: var(--accent-a); font-size: 13px; }
  .refresh-status { font-size: 10px; color: var(--muted); margin-top: 8px; text-align: right; }
  .refresh-status button { background: none; border: 1px solid var(--border); color: var(--muted); padding: 4px 12px; border-radius: 20px; font-size: 10px; cursor: pointer; transition: all 0.2s; }
  .refresh-status button:hover { border-color: var(--accent-a); color: var(--accent-a); }
  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 48px; }
  .chart-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 22px; }
  .chart-card.wide { grid-column: 1 / -1; }
  .chart-title { font-family: 'Unbounded', sans-serif; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
  .chart-title span { color: var(--accent-a); margin-left: 6px; }
  .chart-wrap { position: relative; height: 180px; }
  .chart-wrap.tall { height: 220px; }
  .water-section { margin-bottom: 48px; }
  .water-summary { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 16px; }
  .water-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px 20px; flex: 1; min-width: 150px; }
  .water-value { font-family: 'Unbounded', sans-serif; font-size: 28px; font-weight: 700; color: var(--water-color); }
  .water-goal { font-size: 12px; color: var(--muted); }
  .section-title { font-family: 'Unbounded', sans-serif; font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .weight-cards { display: flex; gap: 12px; overflow-x: auto; scroll-snap-type: x mandatory; padding-bottom: 8px; }
  .weight-cards::-webkit-scrollbar { height: 4px; }
  .weight-cards::-webkit-scrollbar-track { background: var(--border); border-radius: 99px; }
  .weight-cards::-webkit-scrollbar-thumb { background: var(--primary-light); border-radius: 99px; }
  .weight-day-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px 20px; min-width: 180px; flex-shrink: 0; scroll-snap-align: start; }
  .weight-date { font-family: 'Unbounded', sans-serif; font-size: 10px; font-weight: 700; color: var(--muted); margin-bottom: 10px; }
  .weight-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .weight-label { font-size: 11px; color: var(--muted); }
  .weight-val { font-family: 'Unbounded', sans-serif; font-size: 16px; font-weight: 700; color: var(--accent-a); }
  .day-block { margin-bottom: 12px; animation: fadeUp 0.5s ease both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .accordion { border-radius: 16px; overflow: hidden; border: 1px solid var(--border); }
  .accordion-header { background: var(--card2); padding: 16px 20px; cursor: pointer; user-select: none; display: grid; grid-template-columns: auto 1fr auto auto; gap: 14px; align-items: center; transition: background 0.2s; }
  .accordion-header:hover { background: #1f2a4a; }
  .day-label { font-family: 'Unbounded', sans-serif; font-size: 12px; font-weight: 700; color: var(--text); background: var(--primary-dark); padding: 4px 14px; border-radius: 100px; white-space: nowrap; }
  .accordion-summary { display: flex; gap: 20px; flex-wrap: wrap; align-items: center; }
  .summary-macro { display: flex; flex-direction: column; align-items: center; }
  .summary-val { font-family: 'Unbounded', sans-serif; font-size: 15px; font-weight: 700; line-height: 1; }
  .summary-val.kcal { color: var(--accent-a); }
  .summary-val.protein { color: var(--accent-b); }
  .summary-val.carbs { color: var(--carbs-color); }
  .summary-val.fat { color: var(--fat-color); }
  .summary-val.water { color: var(--water-color); }
  .summary-label { font-size: 9px; color: var(--muted); margin-top: 3px; }
  .accordion-bars { display: flex; flex-direction: column; gap: 5px; min-width: 140px; }
  .bar-row { display: flex; align-items: center; gap: 8px; }
  .bar-track { flex: 1; height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 99px; }
  .bar-fill.kcal { background: var(--accent-a); }
  .bar-fill.protein { background: var(--accent-b); }
  .bar-fill.carbs { background: var(--carbs-color); }
  .bar-fill.fat { background: var(--fat-color); }
  .bar-fill.water { background: var(--water-color); }
  .bar-pct { font-size: 10px; color: var(--muted); width: 32px; text-align: right; }
  .accordion-chevron { font-size: 18px; color: var(--muted); transition: transform 0.3s; line-height: 1; }
  .accordion.open .accordion-chevron { transform: rotate(180deg); }
  .accordion-body { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
  .accordion.open .accordion-body { max-height: 2000px; }
  .accordion-inner { padding: 12px; display: flex; flex-direction: column; gap: 8px; background: var(--bg); border-top: 1px solid var(--border); }
  .meal-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; display: grid; grid-template-columns: 90px 1fr auto; gap: 12px; align-items: start; transition: border-color 0.2s; }
  .meal-card:hover { border-color: var(--accent-a-light); }
  .meal-type { font-family: 'Unbounded', sans-serif; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--accent-a-light); padding-top: 2px; }
  .meal-desc { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .meal-desc strong { color: var(--text); font-weight: 500; }
  .meal-macros { display: flex; gap: 8px; flex-wrap: wrap; }
  .macro { display: flex; flex-direction: column; align-items: center; min-width: 48px; }
  .macro-val { font-family: 'Unbounded', sans-serif; font-size: 14px; font-weight: 700; line-height: 1; }
  .macro-val.kcal { color: var(--accent-a); }
  .macro-val.protein { color: var(--accent-b); }
  .macro-val.carbs { color: var(--carbs-color); }
  .macro-val.fat { color: var(--fat-color); }
  .macro-label { font-size: 9px; color: var(--muted); margin-top: 3px; }
  .loading { text-align: center; padding: 40px; color: var(--muted); }
  .empty-state { text-align: center; padding: 40px; color: var(--muted); background: var(--card); border-radius: 20px; margin: 20px 0; }
  footer { text-align: center; font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); padding-top: 24px; margin-top: 60px; }
  
  /* Форма ввода */
  .input-form {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 24px;
    margin-bottom: 48px;
  }
  .form-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .form-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .form-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 12px;
  }
  .form-tab {
    background: none;
    border: none;
    color: var(--muted);
    padding: 8px 16px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    border-radius: 20px;
    transition: all 0.2s;
  }
  .form-tab.active {
    background: var(--accent-a);
    color: #000;
  }
  .form-tab:hover:not(.active) {
    background: var(--card2);
    color: var(--text);
  }
  .form-panel {
    display: none;
  }
  .form-panel.active {
    display: block;
  }
  .form-group {
    margin-bottom: 16px;
  }
  .form-group label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .form-group input, .form-group select {
    width: 100%;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Onest', sans-serif;
  }
  .form-group input:focus, .form-group select:focus {
    outline: none;
    border-color: var(--accent-a);
  }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .submit-btn {
    background: var(--accent-a);
    border: none;
    border-radius: 12px;
    padding: 12px 24px;
    color: #000;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
    font-family: 'Onest', sans-serif;
  }
  .submit-btn:hover {
    background: var(--accent-a-light);
    transform: translateY(-1px);
  }
  .submit-message {
    margin-top: 12px;
    font-size: 11px;
    text-align: center;
  }
  .submit-message.success {
    color: var(--accent-a);
  }
  .submit-message.error {
    color: var(--danger);
  }
  
  /* Стили для перерасхода */
  .summary-val.over {
    color: var(--danger);
    position: relative;
  }
  .summary-val.over::after {
    content: "⚠️";
    font-size: 10px;
    margin-left: 4px;
    position: absolute;
  }
  .summary-val.warning {
    color: var(--warning);
  }
  .summary-val.warning::after {
    content: "⚠️";
    font-size: 10px;
    margin-left: 4px;
    position: absolute;
    opacity: 0.7;
  }
  .bar-pct.over-text {
    color: var(--danger);
    font-weight: bold;
  }
  .bar-pct.warning-text {
    color: var(--warning);
    font-weight: bold;
  }
  
  @media (max-width: 640px) {
    .charts-grid { grid-template-columns: 1fr; }
    .chart-card.wide { grid-column: 1; }
    .meal-card { grid-template-columns: 1fr; gap: 6px; }
    .meal-macros { justify-content: flex-start; gap: 16px; margin-top: 4px; }
    .accordion-header { padding: 12px 14px; grid-template-columns: auto 1fr auto auto; gap: 10px; }
    .accordion-summary { gap: 10px; flex-wrap: nowrap; overflow-x: auto; }
    .accordion-bars { min-width: 90px; }
    body { padding: 16px 12px 60px; }
    header { flex-direction: column; align-items: flex-start; }
    .goals-header { text-align: left; }
    .weight-cards { flex-direction: column; overflow-x: visible; }
    .weight-day-card { min-width: unset; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Дневник<br><span>питания</span></h1>
    <div>
      <div class="goals-header">
        <strong>Цели в день</strong><br>
        🔥 2800 ккал &nbsp;|&nbsp; 💪 160г белка &nbsp;|&nbsp; 🌾 350г углеводов &nbsp;|&nbsp; 🥑 80г жиров &nbsp;|&nbsp; 💧 2.5л воды<br>
        <span style="color:#F1C800">Цель веса: 82 кг</span>
      </div>
      <div class="refresh-status">
        <span id="lastUpdate">Загрузка данных...</span>
        <button onclick="loadAllData()">🔄 Обновить</button>
      </div>
    </div>
  </header>

  <!-- Форма для ручного ввода -->
  <div class="input-form">
    <div class="form-title">✏️ Добавить запись</div>
    <div class="form-tabs">
      <button class="form-tab active" onclick="switchTab('food')">🍽️ Еда</button>
      <button class="form-tab" onclick="switchTab('weight')">⚖️ Вес</button>
      <button class="form-tab" onclick="switchTab('water')">💧 Вода</button>
    </div>
    
    <div id="food-panel" class="form-panel active">
      <div class="form-group"><label>Дата</label><input type="date" id="food-date" value=""></div>
      <div class="form-group"><label>Прием пищи</label><select id="meal-type"><option value="завтрак">Завтрак</option><option value="обед">Обед</option><option value="ужин">Ужин</option><option value="доп">Перекус</option></select></div>
      <div class="form-group"><label>Описание</label><input type="text" id="food-desc" placeholder="Овсянка с бананом..."></div>
      <div class="form-row">
        <div class="form-group"><label>Ккал</label><input type="number" id="food-kcal" placeholder="0"></div>
        <div class="form-group"><label>Белок (г)</label><input type="number" id="food-protein" placeholder="0"></div>
        <div class="form-group"><label>Углеводы (г)</label><input type="number" id="food-carbs" placeholder="0"></div>
        <div class="form-group"><label>Жиры (г)</label><input type="number" id="food-fat" placeholder="0"></div>
      </div>
      <button class="submit-btn" onclick="submitFood()">➕ Добавить прием пищи</button>
      <div id="food-message" class="submit-message"></div>
    </div>
    
    <div id="weight-panel" class="form-panel">
      <div class="form-group"><label>Дата</label><input type="date" id="weight-date" value=""></div>
      <div class="form-group"><label>Вес (кг)</label><input type="number" id="weight-value" step="0.1" placeholder="70.5"></div>
      <button class="submit-btn" onclick="submitWeight()">⚖️ Записать вес</button>
      <div id="weight-message" class="submit-message"></div>
    </div>
    
    <div id="water-panel" class="form-panel">
      <div class="form-group"><label>Дата</label><input type="date" id="water-date" value=""></div>
      <div class="form-group"><label>Количество воды (мл)</label><input type="number" id="water-amount" placeholder="250"></div>
      <button class="submit-btn" onclick="submitWater()">💧 Добавить воду</button>
      <div id="water-message" class="submit-message"></div>
    </div>
  </div>

  <div id="app"><div class="loading">📡 Загрузка данных из Google Sheets...</div></div>
  <footer>Цель: 82 кг · Данные из Google Sheets · Обновляется автоматически</footer>
</div>

<script>
// ==================== КОНФИГУРАЦИЯ ====================
const SHEET_ID = '1A0NOB0Rbx-u-gg6gaKTR1mMbZGwJHUzV9b63o9sqr3w';
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzcWHP5LLFcgItoNbKtSjG3axHudaSiX0zgRqXqGJLGJhCBnZ8przYTHaLZWPc3_7zuOA/exec'; // Сюда вставить URL веб-приложения Google Apps Script для сохранения

const SHEET_FOOD = 'Питание';
const SHEET_WEIGHT = 'Вес';
const SHEET_WATER = 'Вода';

const GOALS = { kcal: 2800, protein: 160, carbs: 350, fat: 80, water: 2500 };

let appData = { foods: [], weights: [], water: [] };
let charts = {};

function setDefaultDates() {
  const today = new Date().toISOString().split('T')[0];
  ['food-date', 'weight-date', 'water-date'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = today;
  });
}

function switchTab(tab) {
  document.querySelectorAll('.form-tab').forEach((btn, i) => btn.classList.remove('active'));
  document.querySelectorAll('.form-panel').forEach(panel => panel.classList.remove('active'));
  if (tab === 'food') {
    document.querySelector('.form-tab:first-child').classList.add('active');
    document.getElementById('food-panel').classList.add('active');
  } else if (tab === 'weight') {
    document.querySelector('.form-tab:nth-child(2)').classList.add('active');
    document.getElementById('weight-panel').classList.add('active');
  } else {
    document.querySelector('.form-tab:nth-child(3)').classList.add('active');
    document.getElementById('water-panel').classList.add('active');
  }
}

function showMessage(elementId, text, type) {
  const el = document.getElementById(elementId);
  if (el) { el.textContent = text; el.className = 'submit-message ' + type; setTimeout(() => { if (el) { el.textContent = ''; el.className = 'submit-message'; } }, 3000); }
}

async function submitToSheet(endpoint, data) {
  if (!WEB_APP_URL) return { success: false };
  try { await fetch(WEB_APP_URL + '?action=' + endpoint, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) }); return { success: true }; } 
  catch(e) { return { success: false }; }
}

function submitFood() {
  const date = document.getElementById('food-date').value;
  const mealType = document.getElementById('meal-type').value;
  const description = document.getElementById('food-desc').value;
  const kcal = parseFloat(document.getElementById('food-kcal').value) || 0;
  const protein = parseFloat(document.getElementById('food-protein').value) || 0;
  const carbs = parseFloat(document.getElementById('food-carbs').value) || 0;
  const fat = parseFloat(document.getElementById('food-fat').value) || 0;
  if (!description) { showMessage('food-message', 'Заполните описание блюда', 'error'); return; }
  appData.foods.push({ date: formatDate(date), mealType, description, kcal, protein, carbs, fat });
  showMessage('food-message', '✅ Добавлено! Обновите страницу', 'success');
  document.getElementById('food-desc').value = '';
  ['food-kcal', 'food-protein', 'food-carbs', 'food-fat'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  submitToSheet('food', { date, mealType, description, kcal, protein, carbs, fat });
}

function submitWeight() {
  const date = document.getElementById('weight-date').value;
  const weight = parseFloat(document.getElementById('weight-value').value);
  if (!weight || weight <= 0) { showMessage('weight-message', 'Введите корректный вес', 'error'); return; }
  appData.weights.push({ date: formatDate(date), weight });
  appData.weights.sort((a,b) => a.date.localeCompare(b.date));
  showMessage('weight-message', '✅ Вес добавлен! Обновите страницу', 'success');
  document.getElementById('weight-value').value = '';
  submitToSheet('weight', { date, weight });
}

function submitWater() {
  const date = document.getElementById('water-date').value;
  const amount = parseFloat(document.getElementById('water-amount').value);
  if (!amount || amount <= 0) { showMessage('water-message', 'Введите количество воды', 'error'); return; }
  appData.water.push({ date: formatDate(date), amount });
  showMessage('water-message', '✅ Вода добавлена! Обновите страницу', 'success');
  document.getElementById('water-amount').value = '';
  submitToSheet('water', { date, amount });
}

async function loadSheetAsCSV(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
  const response = await fetch(url);
  if (!response.ok) throw new Error(`${sheetName}: ${response.status}`);
  return parseCSV(await response.text());
}

function parseCSV(csvText) {
  const rows = [];
  const lines = csvText.split('\n');
  for (const line of lines) {
    if (line.trim() === '') continue;
    const row = []; let inQuotes = false; let currentCell = '';
    for (let i = 0; i < line.length; i++) {
      const char = line[i];
      if (char === '"') inQuotes = !inQuotes;
      else if (char === ',' && !inQuotes) { row.push(currentCell.trim()); currentCell = ''; }
      else currentCell += char;
    }
    row.push(currentCell.trim());
    rows.push(row.map(cell => cell.replace(/^"|"$/g, '')));
  }
  return rows;
}

function parseFoodData(rows) {
  if (!rows || rows.length < 2) return [];
  const headers = rows[0].map(h => h.toLowerCase().trim());
  const dateIdx = headers.findIndex(h => h.includes('дата') || h === 'date');
  const mealIdx = headers.findIndex(h => h.includes('прием') || h.includes('meal'));
  const descIdx = headers.findIndex(h => h.includes('описание') || h.includes('блюдо'));
  const kcalIdx = headers.findIndex(h => h === 'ккал');
  const proteinIdx = headers.findIndex(h => h === 'белок');
  const carbsIdx = headers.findIndex(h => h === 'углеводы');
  const fatIdx = headers.findIndex(h => h === 'жиры' || h === 'жир');
  const foods = [];
  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row[dateIdx]) continue;
    foods.push({
      date: formatDate(row[dateIdx]),
      mealType: row[mealIdx] ? row[mealIdx].toLowerCase() : 'доп',
      description: row[descIdx] || '—',
      kcal: parseFloat(row[kcalIdx]) || 0,
      protein: parseFloat(row[proteinIdx]) || 0,
      carbs: parseFloat(row[carbsIdx]) || 0,
      fat: parseFloat(row[fatIdx]) || 0
    });
  }
  return foods;
}

function parseWeightData(rows) {
  if (!rows || rows.length < 2) return [];
  const headers = rows[0].map(h => h.toLowerCase().trim());
  const dateIdx = headers.findIndex(h => h.includes('дата') || h === 'date');
  const weightIdx = headers.findIndex(h => h.includes('вес') || h === 'weight');
  const weights = [];
  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row[dateIdx]) continue;
    const weight = parseFloat(row[weightIdx]);
    if (!isNaN(weight) && weight > 0) weights.push({ date: formatDate(row[dateIdx]), weight });
  }
  return weights.sort((a,b) => a.date.localeCompare(b.date));
}

function parseWaterData(rows) {
  if (!rows || rows.length < 2) return [];
  const headers = rows[0].map(h => h.toLowerCase().trim());
  const dateIdx = headers.findIndex(h => h.includes('дата') || h === 'date');
  const amountIdx = headers.findIndex(h => h.includes('мл') || h.includes('amount'));
  const water = [];
  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row[dateIdx]) continue;
    const amount = parseFloat(row[amountIdx]);
    if (!isNaN(amount) && amount > 0) water.push({ date: formatDate(row[dateIdx]), amount });
  }
  return water;
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  dateStr = dateStr.split(' ')[0];
  let d = new Date(dateStr);
  if (!isNaN(d.getTime())) return `${d.getDate().toString().padStart(2,'0')}.${(d.getMonth()+1).toString().padStart(2,'0')}`;
  const parts = dateStr.split(/[.\/]/);
  if (parts.length >= 2) return `${parts[0].padStart(2,'0')}.${parts[1].padStart(2,'0')}`;
  return dateStr;
}

function aggregateByDay(foods) {
  const daily = {};
  foods.forEach(f => {
    if (!daily[f.date]) daily[f.date] = { kcal: 0, protein: 0, carbs: 0, fat: 0, meals: [] };
    daily[f.date].kcal += f.kcal;
    daily[f.date].protein += f.protein;
    daily[f.date].carbs += f.carbs;
    daily[f.date].fat += f.fat;
    daily[f.date].meals.push(f);
  });
  return daily;
}

function getWaterByDay(waterData) {
  const waterByDay = {};
  waterData.forEach(w => { waterByDay[w.date] = (waterByDay[w.date] || 0) + w.amount; });
  return waterByDay;
}

function renderUI() {
  const dailyData = aggregateByDay(appData.foods);
  const waterByDay = getWaterByDay(appData.water);
  const dates = Object.keys(dailyData).sort().reverse();
  
  if (dates.length === 0 && appData.weights.length === 0) {
    document.getElementById('app').innerHTML = `<div class="empty-state">📭 Нет данных. Добавьте данные через форму выше или в Google Sheets.</div>`;
    return;
  }
  
  let chartsHtml = `<div class="charts-grid"><div class="chart-card wide"><div class="chart-title">📈 Динамика веса <span>кг</span></div><div class="chart-wrap tall"><canvas id="weightChart"></canvas></div><div class="weight-cards" style="margin-top:16px; display:flex; gap:12px; overflow-x:auto">${appData.weights.slice().reverse().slice(0,7).map(w => `<div class="weight-day-card"><div class="weight-date">${w.date}</div><div class="weight-row"><div class="weight-label">⚖️ Вес</div><div class="weight-val">${w.weight} кг</div></div></div>`).join('')}</div></div><div class="chart-card wide"><div class="chart-title">📊 Нутриенты по дням</div><div class="chart-wrap" style="height:220px"><canvas id="nutrientsChart"></canvas></div></div></div>`;
  
  const last7Days = dates.slice(0,7);
  const avgWater = last7Days.reduce((s,d) => s + (waterByDay[d]||0), 0) / (last7Days.length||1);
  const todayWater = waterByDay[dates[0]] || 0;
  chartsHtml += `<div class="water-section"><div class="section-title">💧 Водный баланс</div><div class="water-summary"><div class="water-card"><div class="water-value">${todayWater} мл</div><div class="water-goal">сегодня / ${GOALS.water} мл</div><div class="bar-track" style="margin-top:8px"><div class="bar-fill water" style="width:${Math.min(100, todayWater/GOALS.water*100)}%"></div></div></div><div class="water-card"><div class="water-value">${Math.round(avgWater)} мл</div><div class="water-goal">среднее за 7 дней</div></div></div></div>`;
  
  let daysHtml = '';
  dates.forEach((date, idx) => {
    const day = dailyData[date];
    const waterAmount = waterByDay[date] || 0;
    const p = (val, goal) => (val / goal) * 100;
    const kcalP = p(day.kcal, GOALS.kcal), protP = p(day.protein, GOALS.protein), carbsP = p(day.carbs, GOALS.carbs), fatP = p(day.fat, GOALS.fat), waterP = p(waterAmount, GOALS.water);
    const isOver = (val, goal) => val > goal * 1.2;
    const isWarn = (val, goal) => val > goal && val <= goal * 1.2;
    daysHtml += `<div class="day-block"><div class="accordion ${idx===0?'open':''}" id="day-${date.replace(/\./g,'-')}"><div class="accordion-header" onclick="toggle('day-${date.replace(/\./g,'-')}')"><div class="day-label">${date}</div><div class="accordion-summary"><div class="summary-macro"><div class="summary-val kcal ${isOver(day.kcal,GOALS.kcal)?'over':(isWarn(day.kcal,GOALS.kcal)?'warning':'')}">${Math.round(day.kcal)}</div><div class="summary-label">ккал</div></div><div class="summary-macro"><div class="summary-val protein ${isOver(day.protein,GOALS.protein)?'over':(isWarn(day.protein,GOALS.protein)?'warning':'')}">${Math.round(day.protein)}г</div><div class="summary-label">белок</div></div><div class="summary-macro"><div class="summary-val carbs ${isOver(day.carbs,GOALS.carbs)?'over':(isWarn(day.carbs,GOALS.carbs)?'warning':'')}">${Math.round(day.carbs)}г</div><div class="summary-label">углев.</div></div><div class="summary-macro"><div class="summary-val fat ${isOver(day.fat,GOALS.fat)?'over':(isWarn(day.fat,GOALS.fat)?'warning':'')}">${Math.round(day.fat)}г</div><div class="summary-label">жиры</div></div><div class="summary-macro"><div class="summary-val water">${waterAmount}мл</div><div class="summary-label">вода</div></div></div><div class="accordion-bars"><div class="bar-row"><div class="bar-track"><div class="bar-fill kcal" style="width:${Math.min(100,kcalP)}%"></div></div><div class="bar-pct ${isOver(day.kcal,GOALS.kcal)?'over-text':(isWarn(day.kcal,GOALS.kcal)?'warning-text':'')}">${kcalP.toFixed(0)}%</div></div><div class="bar-row"><div class="bar-track"><div class="bar-fill protein" style="width:${Math.min(100,protP)}%"></div></div><div class="bar-pct ${isOver(day.protein,GOALS.protein)?'over-text':(isWarn(day.protein,GOALS.protein)?'warning-text':'')}">${protP.toFixed(0)}%</div></div><div class="bar-row"><div class="bar-track"><div class="bar-fill carbs" style="width:${Math.min(100,carbsP)}%"></div></div><div class="bar-pct ${isOver(day.carbs,GOALS.carbs)?'over-text':(isWarn(day.carbs,GOALS.carbs)?'warning-text':'')}">${carbsP.toFixed(0)}%</div></div><div class="bar-row"><div class="bar-track"><div class="bar-fill fat" style="width:${Math.min(100,fatP)}%"></div></div><div class="bar-pct ${isOver(day.fat,GOALS.fat)?'over-text':(isWarn(day.fat,GOALS.fat)?'warning-text':'')}">${fatP.toFixed(0)}%</div></div><div class="bar-row"><div class="bar-track"><div class="bar-fill water" style="width:${Math.min(100,waterP)}%"></div></div><div class="bar-pct">${waterP.toFixed(0)}%</div></div></div><div class="accordion-chevron">▾</div></div><div class="accordion-body"><div class="accordion-inner">${day.meals.map(m => `<div class="meal-card"><div class="meal-type">${m.mealType}</div><div class="meal-desc"><strong>${m.description}</strong></div><div class="meal-macros"><div class="macro"><div class="macro-val kcal">${Math.round(m.kcal)}</div><div class="macro-label">ккал</div></div><div class="macro"><div class="macro-val protein">${Math.round(m.protein)}г</div><div class="macro-label">белок</div></div><div class="macro"><div class="macro-val carbs">${Math.round(m.carbs)}г</div><div class="macro-label">углев.</div></div><div class="macro"><div class="macro-val fat">${Math.round(m.fat)}г</div><div class="macro-label">жиры</div></div></div></div>`).join('')}</div></div></div></div>`;
  });
  
  document.getElementById('app').innerHTML = chartsHtml + daysHtml;
  updateCharts();
  document.getElementById('lastUpdate').innerHTML = `📅 Обновлено: ${new Date().toLocaleTimeString()}`;
}

function updateCharts() {
  const dailyData = aggregateByDay(appData.foods);
  const dates = Object.keys(dailyData).sort();
  if (charts.weight) charts.weight.destroy();
  const weightCtx = document.getElementById('weightChart')?.getContext('2d');
  if (weightCtx && appData.weights.length) {
    charts.weight = new Chart(weightCtx, {
      type: 'line',
      data: { labels: appData.weights.map(w=>w.date), datasets: [{ label: 'Вес', data: appData.weights.map(w=>w.weight), borderColor: '#F1C800', backgroundColor: 'rgba(241,200,0,0.1)', pointBackgroundColor: '#F1C800', pointRadius: 5, tension: 0.3, fill: true }, { label: 'Цель 82 кг', data: Array(appData.weights.length).fill(82), borderColor: '#F16D00', borderDash: [6,4], pointRadius: 0 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#8a9bb5', font: { size: 11 } } } }, scales: { y: { min: 60, max: 85, grid: { color: '#1e2c4a' }, ticks: { color: '#8a9bb5' } }, x: { grid: { color: '#1e2c4a' }, ticks: { color: '#8a9bb5' } } } }
    });
  }
  if (charts.nutrients) charts.nutrients.destroy();
  const nutrientsCtx = document.getElementById('nutrientsChart')?.getContext('2d');
  if (nutrientsCtx && dates.length) {
    charts.nutrients = new Chart(nutrientsCtx, {
      type: 'bar',
      data: { labels: dates, datasets: [{ label: 'Ккал', data: dates.map(d=>dailyData[d].kcal), backgroundColor: 'rgba(241,200,0,0.85)', borderColor: '#F1C800', borderRadius: 6, yAxisID: 'yKcal' }, { label: 'Белок г', data: dates.map(d=>dailyData[d].protein), backgroundColor: 'rgba(241,109,0,0.85)', borderColor: '#F16D00', borderRadius: 6, yAxisID: 'yGrams' }, { label: 'Углеводы г', data: dates.map(d=>dailyData[d].carbs), backgroundColor: 'rgba(90,245,200,0.85)', borderColor: '#5af5c8', borderRadius: 6, yAxisID: 'yGrams' }, { label: 'Жиры г', data: dates.map(d=>dailyData[d].fat), backgroundColor: 'rgba(255,107,107,0.85)', borderColor: '#ff6b6b', borderRadius: 6, yAxisID: 'yGrams' }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#8a9bb5', font: { size: 11 } } } }, scales: { x: { grid: { color: '#1e2c4a' }, ticks: { color: '#8a9bb5' } }, yKcal: { position: 'left', grid: { color: '#1e2c4a' }, ticks: { color: '#F1C800' }, min: 0, max: 4000 }, yGrams: { position: 'right', grid: { drawOnChartArea: false }, ticks: { color: '#5af5c8' }, min: 0, max: 500 } } }
    });
  }
}

async function loadAllData() {
  document.getElementById('app').innerHTML = '<div class="loading">📡 Загрузка данных из Google Sheets...</div>';
  try {
    const [foodRows, weightRows, waterRows] = await Promise.all([loadSheetAsCSV(SHEET_FOOD), loadSheetAsCSV(SHEET_WEIGHT), loadSheetAsCSV(SHEET_WATER)]);
    appData.foods = parseFoodData(foodRows);
    appData.weights = parseWeightData(weightRows);
    appData.water = parseWaterData(waterRows);
    console.log(`✅ Загружено: еда=${appData.foods.length}, вес=${appData.weights.length}, вода=${appData.water.length}`);
    renderUI();
  } catch (error) {
    console.error('Ошибка:', error);
    document.getElementById('app').innerHTML = `<div class="empty-state">❌ Ошибка загрузки: ${error.message}<br><br>Проверьте доступность таблицы (Файл → Поделиться → Доступ для всех с ссылкой)</div>`;
  }
}

function toggle(id) { const el = document.getElementById(id); if (el) el.classList.toggle('open'); }

setDefaultDates();
loadAllData();
setInterval(loadAllData, 300000);
</script>
